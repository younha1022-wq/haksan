<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 업무 보고</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; }
  body {
    background: linear-gradient(135deg, #eaf1fb, #f4f8fc);
    min-height: 100vh;
    padding: 30px 16px;
    color: #333;
  }
  .container {
    max-width: 1000px;
    margin: 0 auto;
  }
  header {
    text-align: center;
    margin-bottom: 20px;
    position: relative;
  }
  header h1 {
    font-size: 2.2rem;
    color: #003876;
    margin-bottom: 6px;
    padding-bottom: 10px;
    border-bottom: 4px solid #ffc72c;
    display: inline-block;
  }
  header p {
    color: #888;
    margin-top: 10px;
  }
  .admin-bar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 10px;
  }
  .admin-toggle-btn {
    padding: 8px 16px;
    border: 1px solid #003876;
    background: #fff;
    color: #003876;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    transition: all .2s;
  }
  .admin-toggle-btn:hover {
    background: #003876;
    color: #fff;
  }
  .admin-toggle-btn.active {
    background: #ffc72c;
    border-color: #ffc72c;
    color: #003876;
  }
  .admin-toggle-btn.active:hover {
    background: #e6b227;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  .card h2 {
    margin-bottom: 16px;
    color: #003876;
    font-size: 1.3rem;
    border-bottom: 2px solid #eee;
    padding-bottom: 8px;
  }
  .card h3 {
    color: #003876;
    font-size: 1.05rem;
    margin: 18px 0 10px;
  }

  /* 새 게시글 작성 */
  .new-post-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .new-post-row input {
    flex: 1;
    min-width: 160px;
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 1rem;
  }
  .new-post-row button, .primary-btn {
    padding: 10px 20px;
    border: none;
    background: #003876;
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    transition: background .2s;
  }
  .new-post-row button:hover, .primary-btn:hover {
    background: #002a57;
  }
  .ghost-btn {
    padding: 8px 16px;
    border: 1px solid #003876;
    background: #fff;
    color: #003876;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
  }
  .ghost-btn:hover {
    background: #eaf2fb;
  }
  .small-btn {
    padding: 4px 10px;
    border: 1px solid #ccc;
    background: #fff;
    color: #666;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
  }
  .small-btn:hover {
    border-color: #003876;
    color: #003876;
  }
  .small-btn.danger:hover {
    border-color: #ff4a4a;
    color: #ff4a4a;
  }

  /* 게시글 목록 */
  .board-header {
    display: flex;
    align-items: center;
    padding: 10px 18px;
    border-bottom: 2px solid #003876;
    color: #003876;
    font-weight: 700;
    font-size: 0.85rem;
  }
  .board-header .col-no { width: 50px; text-align: center; }
  .board-header .col-title { flex: 1; }
  .board-header .col-meta { width: 160px; text-align: center; }
  @media (max-width: 600px) {
    .board-header .col-no, .board-header .col-meta { display: none; }
  }
  #postList {
    list-style: none;
    display: flex;
    flex-direction: column;
  }
  .post-item {
    background: #fff;
    border-bottom: 1px solid #eee;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background .15s, transform .15s;
  }
  .post-item:hover {
    background: #eaf2fb;
  }
  .post-item .post-no {
    width: 50px;
    flex-shrink: 0;
    text-align: center;
    font-weight: 700;
    color: #b8c8da;
    font-size: 1rem;
  }
  .post-item .post-no.latest {
    color: #fff;
    background: #ffc72c;
    border-radius: 6px;
    padding: 2px 0;
    font-size: 0.7rem;
    font-weight: 800;
  }
  .post-item .post-main {
    flex: 1;
    min-width: 0;
  }
  .post-item .post-title {
    font-weight: 700;
    color: #1a1a1a;
    font-size: 1.05rem;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .post-item .post-title .badge {
    flex-shrink: 0;
    background: #003876;
    color: #fff;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .post-item .post-meta {
    font-size: 0.82rem;
    color: #999;
    margin-top: 4px;
  }
  .post-item .post-side {
    width: 160px;
    flex-shrink: 0;
    text-align: center;
    font-size: 0.82rem;
    color: #888;
  }
  @media (max-width: 600px) {
    .post-item .post-no, .post-item .post-side { display: none; }
  }
  .post-item .post-actions button {
    background: none;
    border: none;
    color: #ccc;
    cursor: pointer;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .post-item .post-actions button:hover {
    color: #ff4a4a;
  }
  .empty {
    color: #aaa;
    font-style: italic;
    text-align: center;
    padding: 20px 0;
  }

  /* 상세 페이지 */
  .detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .back-btn {
    background: none;
    border: none;
    color: #003876;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
  }
  .back-btn:hover {
    text-decoration: underline;
  }
  .detail-title {
    font-size: 1.4rem;
    color: #333;
    font-weight: 700;
  }
  .detail-date {
    color: #999;
    font-size: 0.9rem;
    margin-top: 4px;
  }

  /* 입력 공통 */
  label.field-label {
    display: block;
    font-weight: 600;
    color: #555;
    font-size: 0.88rem;
    margin-bottom: 4px;
    margin-top: 12px;
  }
  .text-input, .textarea, select.text-input {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 0.92rem;
    font-family: inherit;
  }
  .textarea {
    min-height: 70px;
    resize: vertical;
  }
  .text-input:focus, .textarea:focus {
    outline: 2px solid #00387644;
    border-color: #003876;
  }

  /* 전체 담당업무 개요 표 */
  .ov-table, .sub-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 8px;
  }
  .ov-table th, .ov-table td, .sub-table th, .sub-table td {
    border: 1px solid #e2e8f0;
    padding: 6px;
    font-size: 0.88rem;
    vertical-align: top;
  }
  .ov-table th, .sub-table th {
    background: #f5f9fd;
    color: #003876;
  }
  .ov-table input, .sub-table input, .ov-table select, .sub-table select, .ov-table textarea, .sub-table textarea {
    width: 100%;
    border: 1px solid #d8e3f0;
    border-radius: 4px;
    background: #fff;
    font-size: 0.88rem;
    font-family: inherit;
    padding: 4px;
  }
  .ov-table textarea, .sub-table textarea {
    min-height: 40px;
    resize: vertical;
  }
  .ov-table input, .sub-table input {
    min-height: 34px;
  }
  .ov-table input:focus, .sub-table input:focus, .ov-table select:focus, .sub-table textarea:focus {
    outline: 1px solid #003876;
    border-color: #003876;
  }
  .col-del { width: 36px; text-align: center; }
  .proc-cell {
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }
  .proc-cell .proc-no {
    flex-shrink: 0;
    padding: 6px 0 0;
    color: #003876;
    font-weight: 700;
    font-size: 0.85rem;
    white-space: nowrap;
  }
  .proc-cell textarea {
    flex: 1;
  }

  /* 보고 항목 편집 카드 */
  .item-editor {
    border: 2px solid #d6e4f2;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    background: #fbfdff;
  }
  .item-editor-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .item-editor-header .text-input {
    font-weight: 700;
    color: #003876;
    flex: 1;
    min-width: 0;
  }
  .criteria-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 16px;
    margin: 10px 0;
    font-size: 0.88rem;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 10px 14px;
  }
  .criteria-grid label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  @media (max-width: 600px) {
    .criteria-grid { grid-template-columns: 1fr; }
  }
  .result-toggle {
    display: flex;
    gap: 16px;
    margin: 8px 0;
    font-size: 0.9rem;
  }
  .result-toggle label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .sub-section-title {
    font-size: 0.9rem;
    font-weight: 700;
    color: #555;
    margin: 14px 0 6px;
  }
  .bullet-editor {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 6px;
  }
  .bullet-row {
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }
  .bullet-dash {
    padding-top: 9px;
    color: #999;
    font-weight: 700;
  }
  .bullet-row .textarea {
    flex: 1;
    min-height: 38px;
  }
  .level-btn {
    flex-shrink: 0;
    min-width: 34px;
    padding: 6px 8px;
    font-weight: 800;
    text-align: center;
  }
  .level-btn.locked {
    cursor: default;
    background: #eef3f8;
    color: #003876;
  }
  .bullet-editor-actions {
    display: flex;
    gap: 6px;
  }
  .image-edit-row {
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    padding: 8px;
    background: #f4f7fb;
    border-radius: 6px;
  }
  .img-ctrl { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .img-ctrl .small-btn.active { background: #0060A8; color: #fff; }
  .img-uploading { color: #888; font-style: italic; padding: 12px 0; }
  .bullet-groups {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 6px;
  }
  .bullet-group {
    border: 1px solid #e3eaf2;
    border-radius: 8px;
    padding: 8px;
    background: #fbfdff;
  }
  .bullet-group .bullet-editor {
    margin-bottom: 0;
  }
  .bullet-group-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 4px;
  }
  .table-row {
    flex-direction: column;
    align-items: stretch;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 8px;
  }
  .mini-table-wrap { overflow-x: auto; }
  .mini-table-toolbar { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 4px; align-items: center; }
  .mini-table {
    border-collapse: collapse;
    margin-bottom: 6px;
    table-layout: fixed;
  }
  .mini-table td {
    border: 1px solid #d8e3f0;
    padding: 0;
    position: relative;
  }
  .mini-table td.cell-selected {
    background: rgba(0,96,168,0.13);
    outline: 2px solid #0060A8;
    outline-offset: -2px;
  }
  .col-resize-handle {
    position: absolute;
    right: -3px; top: 0;
    width: 6px; height: 100%;
    cursor: col-resize;
    z-index: 5;
  }
  .col-resize-handle:hover { background: rgba(0,96,168,0.35); }
  .mini-table input {
    width: 100%;
    border: none;
    padding: 6px;
    font-size: 0.85rem;
    font-family: inherit;
    background: transparent;
    box-sizing: border-box;
  }
  .mini-table input:focus { outline: 1px solid #003876; }
  .mini-table-actions { display: flex; gap: 4px; flex-wrap: wrap; }
  .sel-toggle.active { background: #003876 !important; color: #fff !important; }
  .view-table {
    width: 100%;
    border-collapse: collapse;
    margin: 6px 0;
    font-size: 0.85rem;
  }
  .view-table td {
    border: 1px solid #ccc;
    padding: 6px 8px;
  }

  .edit-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 16px;
  }

  /* 제출 현황 카드 */
  .reporter-card {
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: opacity 0.15s;
  }
  .reporter-card.dragging { opacity: 0.35; }
  .reporter-card.drag-over { border: 2px dashed #0060A8; background: #eef5ff; }
  .drag-handle {
    cursor: grab;
    color: #bbb;
    font-size: 1.1rem;
    padding: 0 6px 0 0;
    user-select: none;
    flex-shrink: 0;
  }
  .drag-handle:active { cursor: grabbing; }
  /* ---------- 이전 주 불러오기 ---------- */
  .prev-load-btn { margin-bottom:10px; }
  .prev-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; align-items:center; justify-content:center; }
  .prev-modal.open { display:flex; }
  .prev-modal-box { background:#fff; border-radius:12px; padding:28px 24px 20px; width:360px; max-width:95vw; box-shadow:0 8px 32px rgba(0,0,0,.18); }
  .prev-modal-box h3 { margin:0 0 16px; color:#003876; font-size:1.05rem; }
  .prev-modal-box label { display:block; font-size:0.82rem; color:#666; margin:12px 0 4px; }
  .prev-modal-box select { width:100%; padding:8px; border:1px solid #ccc; border-radius:6px; font-size:0.9rem; }
  .prev-modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:16px; }
  .prev-modal-actions button { padding:7px 18px; border-radius:6px; border:none; cursor:pointer; font-size:0.9rem; }
  /* ---------- 피드백 ---------- */
  @keyframes fab-pulse { 0%,100%{box-shadow:0 4px 14px rgba(0,96,168,.5),0 0 0 0 rgba(0,96,168,.35)} 60%{box-shadow:0 4px 14px rgba(0,96,168,.5),0 0 0 10px rgba(0,96,168,0)} }
  .feedback-fab { position:fixed; bottom:28px; right:28px; height:46px; padding:0 20px 0 14px; border-radius:23px; background:#0060A8; color:#fff; border:none; font-size:0.95rem; font-weight:700; cursor:pointer; z-index:900; display:flex; align-items:center; gap:7px; animation:fab-pulse 2.4s ease-in-out infinite; transition:background .15s,transform .12s; letter-spacing:.3px; }
  .feedback-fab:hover { background:#003876; transform:scale(1.05); animation:none; box-shadow:0 4px 18px rgba(0,96,168,.55); }
  .feedback-fab .fab-icon { font-size:1.2rem; line-height:1; }
  .feedback-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; align-items:center; justify-content:center; }
  .feedback-modal.open { display:flex; }
  .feedback-modal-box { background:#fff; border-radius:12px; padding:28px 24px 20px; width:340px; max-width:95vw; box-shadow:0 8px 32px rgba(0,0,0,.18); }
  .feedback-modal-box h3 { margin:0 0 16px; color:#003876; font-size:1.05rem; }
  .star-row { display:flex; gap:6px; margin-bottom:14px; }
  .star-btn { font-size:1.7rem; background:none; border:none; cursor:pointer; color:#ddd; padding:0; line-height:1; transition:color .1s; }
  .star-btn.active, .star-btn:hover, .star-btn.hover { color:#f5a623; }
  #feedbackText { width:100%; height:90px; border:1px solid #ccc; border-radius:6px; padding:8px; font-size:0.9rem; resize:vertical; box-sizing:border-box; font-family:inherit; }
  .feedback-modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:12px; }
  .feedback-modal-actions button { padding:7px 18px; border-radius:6px; border:none; cursor:pointer; font-size:0.9rem; }
  #feedbackCancelBtn { background:#eee; color:#555; }
  #feedbackSubmitBtn { background:#0060A8; color:#fff; }
  #feedbackSubmitBtn:disabled { opacity:.6; cursor:default; }
  .feedback-section { margin-top:18px; border-top:1px solid #eee; padding-top:14px; }
  .feedback-section h3 { font-size:0.95rem; color:#003876; margin:0 0 10px; display:flex; align-items:center; gap:8px; }
  .feedback-list { display:flex; flex-direction:column; gap:8px; max-height:320px; overflow-y:auto; }
  .feedback-item { background:#f8f9fc; border:1px solid #e8ecf4; border-radius:8px; padding:10px 12px; }
  .feedback-meta { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
  .feedback-stars { color:#f5a623; font-size:1rem; letter-spacing:1px; }
  .feedback-date { font-size:0.75rem; color:#999; }
  .feedback-content { margin:0; font-size:0.88rem; color:#333; white-space:pre-wrap; }
  .feedback-empty { color:#aaa; font-size:0.88rem; text-align:center; padding:16px 0; }
  .reporter-card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: #f5f9fd;
    cursor: pointer;
  }
  .reporter-card-head .name {
    font-weight: 700;
    color: #003876;
  }
  .reporter-card-head .count {
    font-size: 0.82rem;
    color: #999;
    margin-left: 8px;
  }
  .reporter-card-actions {
    display: flex;
    gap: 6px;
  }
  .reporter-card-body {
    padding: 16px;
    display: none;
    font-size: 0.9rem;
  }
  .reporter-card-body.open {
    display: block;
  }
  .reporter-card-body h4 {
    color: #003876;
    margin: 12px 0 6px;
    font-size: 0.95rem;
  }
  .reporter-card-body .item-block {
    border-top: 1px dashed #ddd;
    padding-top: 10px;
    margin-top: 10px;
  }
  .reporter-card-body p {
    white-space: pre-wrap;
    margin: 4px 0;
    line-height: 1.5;
  }
  .reporter-card-body .label-line {
    color: #888;
    font-size: 0.82rem;
    font-weight: 600;
    margin-top: 6px;
  }

  .save-status {
    text-align: center;
    color: #aaa;
    font-size: 0.85rem;
    margin-top: 14px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📋 주간 업무 보고</h1>
    <p>주별로 게시글을 만들고, 담당자별 업무를 입력해 취합하세요</p>
  </header>

  <div class="admin-bar">
    <button class="admin-toggle-btn" id="adminToggleBtn" onclick="toggleAdmin()">🔒 관리자 로그인</button>
  </div>

  <!-- 목록 화면 -->
  <div id="listView">
    <div class="card">
      <h2>📂 주간보고 목록</h2>
      <div class="board-header">
        <span class="col-no">번호</span>
        <span class="col-title">제목</span>
        <span class="col-meta">작성일 / 담당자</span>
      </div>
      <ul id="postList"></ul>
    </div>

    <div class="card" id="adminPanel" style="display:none;">
      <h2>📝 새 주간보고 작성 (관리자)</h2>
      <div class="new-post-row">
        <input type="text" id="newPostTitle" placeholder="예: 2026년 6월 2주차 업무보고" />
        <input type="date" id="newPostDate" />
        <button onclick="addPost()">생성</button>
      </div>
      <div class="feedback-section">
        <h3>💬 이용자 피드백 <button class="small-btn" onclick="loadFeedback()">새로고침</button></h3>
        <div class="feedback-list" id="feedbackList"><p class="feedback-empty">새로고침을 눌러 불러오세요.</p></div>
      </div>
    </div>
  </div>

  <!-- 상세 화면 -->
  <div id="detailView" style="display:none;">
    <div class="card">
      <div class="detail-header">
        <button class="back-btn" onclick="showList()">← 목록으로</button>
        <button class="ghost-btn" onclick="exportPost()">🖨️ 인쇄/출력용으로 보기</button>
      </div>

function serializeForFirestore(obj) {
  // Firestore does not support nested arrays (array-of-arrays).
  // Convert table bullet rows (2D array) to a JSON string before saving.
  const clone = JSON.parse(JSON.stringify(obj));
  function walk(o) {
    if (Array.isArray(o)) { o.forEach(walk); return; }
    if (!o || typeof o !== 'object') return;
    if (o.type === 'table' && Array.isArray(o.rows)) {
      o.rowsJson = JSON.stringify(o.rows);
      delete o.rows;
    }
    Object.values(o).forEach(walk);
  }
  walk(clone);
  return clone;
}
function deserializeFromFirestore(obj) {
  function walk(o) {
    if (Array.isArray(o)) { o.forEach(walk); return; }
    if (!o || typeof o !== 'object') return;
    if (o.type === 'table' && typeof o.rowsJson === 'string') {
      try { o.rows = JSON.parse(o.rowsJson); } catch(e) { o.rows = []; }
      delete o.rowsJson;
    }
    Object.values(o).forEach(walk);
  }
  walk(obj);
  return obj;
}

// ---------- 불릿 항목 (텍스트 / 표) ----------
const BULLET_MARKERS = ['○', '-', '·'];
function newTextBullet(level) {
  return { type: 'text', level: level || 0, text: '' };
}
function newTableBullet() {
  return { type: 'table', colWidths: [120, 120], rows: [[{v:''},{v:''}],[{v:''},{v:''}]] };
}
function newImageBullet(url, width) {
  return { type: 'image', url: url || '', width: width || 50 };
}
function normCell(c) {
  if (c === null) return null;
  if (typeof c === 'string') return { v: c };
  return { v: c.v || '', ...(c.cs > 1 ? {cs: c.cs} : {}), ...(c.rs > 1 ? {rs: c.rs} : {}) };
}
function normalizeBullets(bullets) {
  if (!bullets || !bullets.length) return [newTextBullet(0)];
  return bullets.map(b => {
    if (typeof b === 'string') return { type: 'text', level: 0, text: b };
    if (b.type === 'table') {
      let rows = b.rows;
      if (!rows && b.rowsJson) { try { rows = JSON.parse(b.rowsJson); } catch(e) {} }
      if (!rows || !rows.length) rows = [['',''],['','']];
      rows = rows.map(row => row.map(normCell));
      const numCols = Math.max(...rows.map(r => r.length));
      const colWidths = (b.colWidths && b.colWidths.length === numCols)
        ? b.colWidths : Array(numCols).fill(120);
      return { type: 'table', colWidths, rows };
    }
    if (b.type === 'image') return { type: 'image', url: b.url || '', width: b.width || 50 };
    return { type: 'text', level: b.level || 0, text: b.text || '' };
  });
}
// ---------- 항목 그룹 (○ 대표 항목 + 하위 -/· 항목들) ----------
function normalizeGroupBullets(bullets) {
  bullets = normalizeBullets(bullets);
  if (bullets[0].type === 'table') bullets.unshift(newTextBullet(0));
  bullets[0].level = 0;
  for (let k = 1; k < bullets.length; k++) {
    const b = bullets[k];
    if (b.type === 'text' && (b.level || 0) < 1) b.level = 1;
  }
  return { bullets };
}
function normalizeGroups(groups, fallbackFlatBullets) {
  if (groups && groups.length) return groups.map(g => normalizeGroupBullets(g.bullets));
  const flat = normalizeBullets(fallbackFlatBullets);
  const result = [];
  flat.forEach(b => {
    if (!result.length || (b.type === 'text' && (b.level || 0) === 0)) {
      result.push({ bullets: [b] });
    } else {
      result[result.length - 1].bullets.push(b);
    }
  });
  return result.map(g => normalizeGroupBullets(g.bullets));
}
function flattenGroupBullets(groups) {
  return [].concat(...(groups || []).map(g => g.bullets));
}

// ---------- 옛 데이터(단일 텍스트) -> 항목 목록 형태로 변환 ----------
function procLabel(overviewIdx, procIdx) {
  return `[${overviewIdx + 1}-${procIdx + 1}]`;
}
function hasBulletContent(bullets) {
  return (bullets || []).some(b => {
    if (b.type === 'table') return b.rows.some(row => row.some(c => c && c.v && c.v.trim()));
    if (b.type === 'image') return !!b.url;
    return b.text && b.text.trim();
  });
}
function renderTableHtml(b, cls) {
  let out = `<table class="${cls}"><tbody>`;
  b.rows.forEach(row => {
    out += '<tr>';
    row.forEach(c => {
      if (c === null) return;
      const cs = c.cs > 1 ? ` colspan="${c.cs}"` : '';
      const rs = c.rs > 1 ? ` rowspan="${c.rs}"` : '';
      out += `<td${cs}${rs}>${escapeHtml(c.v || '')}</td>`;
    });
    out += '</tr>';
  });
  return out + '</tbody></table>';
}
function renderBulletsView(bullets) {
  if (!hasBulletContent(bullets)) return '<p>-</p>';
  let out = '';
  bullets.forEach(b => {
    if (b.type === 'table') {
      if (!b.rows.some(row => row.some(c => c && c.v && c.v.trim()))) return;
      out += renderTableHtml(b, 'view-table');
    } else if (b.type === 'image') {
      if (!b.url) return;
      out += `<div style="margin:6px 0;"><img src="${b.url}" style="max-width:${b.width||50}%;height:auto;display:block;"></div>`;
    } else {
      if (!b.text || !b.text.trim()) return;
      const marker = BULLET_MARKERS[b.level || 0] || '○';
      out += `<p style="white-space:pre-wrap; margin-left:${(b.level || 0) * 16}px;">${marker} ${escapeHtml(b.text)}</p>`;
    }
  });
  return out;
}
function splitToBullets(text) {
  if (!text) return [''];
  const lines = String(text).split('\n').map(s => s.replace(/^[-·]\s*/, '').trim()).filter(Boolean);
  return lines.length ? lines : [''];
}
function normalizeReporter(r) {
  (r.overview || []).forEach(o => {
    if (!o.processes) o.processes = [{ text: o.process || '', status: o.status || '완료' }];
  });
  (r.items || []).forEach(item => {
    item.lastWeekGroups = normalizeGroups(item.lastWeekGroups, item.lastWeekBullets || splitToBullets(item.lastWeekContent));
    item.resultGroups = normalizeGroups(item.resultGroups, item.resultBullets || splitToBullets(item.resultContent));
    delete item.lastWeekBullets;
    delete item.lastWeekContent;
    delete item.resultBullets;
    delete item.resultContent;
    (item.plans || []).forEach(p => {
      p.bullets = normalizeGroupBullets(p.bullets || splitToBullets(p.content)).bullets;
      delete p.content;
    });
  });
}

    : `#editArea [data-ov="${anchor.idx}"]`;

  if (el) (el.closest('tr') || el.closest('div') || el).scrollIntoView({ behavior: 'smooth', block: 'center' });
}

let tableSelectState = null;
let dragSrcIdx = null;
let isDragging = false;
let rerenderPending = false;

function updateTableSelectUI() {
  document.querySelectorAll('.mini-table td.cell-selected').forEach(td => td.classList.remove('cell-selected'));
  document.querySelectorAll('.sel-toggle').forEach(btn => {
    const key = btn.dataset.item + '-' + (btn.dataset.group||'') + (btn.dataset.plan||'') + '-' + btn.dataset.bidx;
    btn.classList.toggle('active', !!(tableSelectState && tableSelectState.key === key));
  });
  if (!tableSelectState || !tableSelectState.cells.size) return;
  const ds = tableSelectState.ds;
  document.querySelectorAll('.mini-table').forEach(tbl => {
    if (tbl.dataset.item !== ds.item || tbl.dataset.bidx !== ds.bidx) return;
    if ((tbl.dataset.group||'') !== (ds.group||'') || (tbl.dataset.plan||'') !== (ds.plan||'')) return;
    tbl.querySelectorAll('td').forEach(td => {
      const inp = td.querySelector('input');
      if (inp && tableSelectState.cells.has(inp.dataset.trow + ',' + inp.dataset.tcol))
        td.classList.add('cell-selected');
    });
  });
}

function initTableInteraction() {
  // 열 너비 드래그 리사이즈
  document.querySelectorAll('.mini-table').forEach(tbl => {
    const cols = tbl.querySelectorAll('col');
    tbl.querySelectorAll('td').forEach(td => {
      const handle = td.querySelector('.col-resize-handle');
      if (!handle) return;
      const ci = +handle.dataset.col;
      if (ci >= cols.length) return;
      handle.addEventListener('mousedown', ev => {
        ev.preventDefault(); ev.stopPropagation();
        const startX = ev.pageX;
        const startW = parseInt(cols[ci].style.width) || 120;
        const onMove = e => {
          cols[ci].style.width = Math.max(40, startW + e.pageX - startX) + 'px';
        };
        const onUp = e => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          const newW = Math.max(40, startW + e.pageX - startX);
          const b = getBulletArray(tbl.dataset)[+tbl.dataset.bidx];
          if (!b.colWidths) b.colWidths = Array(cols.length).fill(120);
          b.colWidths[ci] = newW;
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    });
  });

  // 셀 선택 클릭 (선택 모드일 때만)
  document.querySelectorAll('.mini-table td').forEach(td => {
    td.addEventListener('click', e => {
      if (!tableSelectState) return;
      const tbl = td.closest('.mini-table');
      if (!tbl) return;
      const ds = tableSelectState.ds;
      if (tbl.dataset.item !== ds.item || tbl.dataset.bidx !== ds.bidx) return;
      if ((tbl.dataset.group||'') !== (ds.group||'') || (tbl.dataset.plan||'') !== (ds.plan||'')) return;
      const inp = td.querySelector('input');
      if (!inp) return;
      e.preventDefault();
      inp.blur();
      const cellKey = inp.dataset.trow + ',' + inp.dataset.tcol;
      if (tableSelectState.cells.has(cellKey)) tableSelectState.cells.delete(cellKey);
      else tableSelectState.cells.add(cellKey);
      updateTableSelectUI();
    });
  });

  updateTableSelectUI();
}

document.getElementById('editArea').addEventListener('input', handleEditInput);
document.getElementById('editArea').addEventListener('change', handleEditInput);
function handleEditInput(e) {
  const t = e.target;
  const _now = Date.now();
  if (_now - _lastTextSnap > 5000) { pushDraftHistory(t); _lastTextSnap = _now; }
  if (t.id === 'reporterNameInput') { draft.name = t.value; return; }
  if (t.dataset.ov !== undefined) {
    const ov = draft.overview[+t.dataset.ov];
    if (t.dataset.proc !== undefined) {
      const proc = ov.processes[+t.dataset.proc];
      proc[t.dataset.pf] = t.value;
    } else {
      ov[t.dataset.f] = t.value;
    }
    refreshTitleSelects();
    return;
  }
  if (t.dataset.item !== undefined) {
    const item = draft.items[+t.dataset.item];
    if (t.dataset.crit !== undefined) {
      item.criteria[t.dataset.crit] = t.checked;
    } else if (t.dataset.bf !== undefined) {
      const b = getBulletArray(t.dataset)[+t.dataset.bidx];
      if (t.dataset.trow !== undefined) {
        b.rows[+t.dataset.trow][+t.dataset.tcol].v = t.value;
      } else {
        b.text = t.value;
      }
    } else if (t.dataset.plan !== undefined) {
      item.plans[+t.dataset.plan][t.dataset.pf] = t.value;
    } else if (t.dataset.coop !== undefined) {
      item.coops[+t.dataset.coop][t.dataset.cf] = t.value;
    } else if (t.dataset.dec !== undefined) {
      item.decisions[+t.dataset.dec].content = t.value;
    } else if (t.dataset.f === 'titleSelect') {
      item.title = t.value;
      return;
    } else if (t.dataset.f !== undefined) {
      item[t.dataset.f] = t.value;
    }
  }
}

// ---------- 버튼 클릭 (구조 변경 -> 재렌더) ----------
document.getElementById('editArea').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  if (action !== 'table-sel-toggle' && action !== 'save-draft') pushDraftHistory(btn);
  if (action === 'add-overview') draft.overview.push(newOverviewRow());
  else if (action === 'del-overview') {
    if (draft.overview.length <= 1) { alert('최소 1개의 업무가 필요합니다.'); return; }
    draft.overview.splice(+btn.dataset.idx, 1);
  }
  else if (action === 'add-process') draft.overview[+btn.dataset.ov].processes.push({ text: '', status: '완료' });
  else if (action === 'del-process') {
    const ov = draft.overview[+btn.dataset.ov];
    if (ov.processes.length <= 1) return;
    ov.processes.splice(+btn.dataset.idx, 1);
  }
  else if (action === 'add-item') draft.items.push(newItem());
  else if (action === 'del-item') {
    if (draft.items.length <= 1) { alert('최소 1개의 보고 항목이 필요합니다.'); return; }
    draft.items.splice(+btn.dataset.idx, 1);
  }
  else if (action === 'add-plan') draft.items[+btn.dataset.item].plans.push({ bullets: [newTextBullet(0)], deadline: '' });
  else if (action === 'del-plan') draft.items[+btn.dataset.item].plans.splice(+btn.dataset.idx, 1);
  else if (action === 'add-group') draft.items[+btn.dataset.item][btn.dataset.bf].push({ bullets: [newTextBullet(0)] });
  else if (action === 'del-group') {
    const arr = draft.items[+btn.dataset.item][btn.dataset.bf];
    if (arr.length > 1) arr.splice(+btn.dataset.idx, 1);
  }
  else if (action === 'add-bullet') getBulletArray(btn.dataset).push(newTextBullet(1));
  else if (action === 'add-table') getBulletArray(btn.dataset).push(newTableBullet());
  else if (action === 'add-image') { _imgUploadTarget = {...btn.dataset}; _imgFileInput.click(); return; }
  else if (action === 'img-width') { getBulletArray(btn.dataset)[+btn.dataset.bidx].width = +btn.dataset.w; }
  else if (action === 'del-bullet') getBulletArray(btn.dataset).splice(+btn.dataset.idx, 1);
  else if (action === 'cycle-level') {
    const b = getBulletArray(btn.dataset)[+btn.dataset.idx];
    const min = btn.dataset.minlevel !== undefined ? +btn.dataset.minlevel : 0;
    const max = btn.dataset.maxlevel !== undefined ? +btn.dataset.maxlevel : BULLET_MARKERS.length - 1;
    const range = max - min + 1;
    b.level = min + (((b.level || 0) - min + 1) % range);
  }
  else if (action === 'table-sel-toggle') {
    const key = btn.dataset.item + '-' + (btn.dataset.group||'') + (btn.dataset.plan||'') + '-' + btn.dataset.bidx;
    if (tableSelectState && tableSelectState.key === key) {
      tableSelectState = null;
    } else {
      tableSelectState = { key, ds: {...btn.dataset}, cells: new Set() };
    }
    updateTableSelectUI();
    return;
  }
  else if (action === 'table-merge') {
    if (!tableSelectState || tableSelectState.cells.size < 2) { alert('병합할 셀을 2개 이상 선택하세요.'); return; }
    const b = getBulletArray(btn.dataset)[+btn.dataset.bidx];
    const pts = Array.from(tableSelectState.cells).map(s => s.split(',').map(Number));
    const r1 = Math.min(...pts.map(p=>p[0])), r2 = Math.max(...pts.map(p=>p[0]));
    const c1 = Math.min(...pts.map(p=>p[1])), c2 = Math.max(...pts.map(p=>p[1]));
    const vals = [];
    for (let r = r1; r <= r2; r++) for (let c = c1; c <= c2; c++) {
      const cell = b.rows[r][c];
      if (cell && cell.v && cell.v.trim()) vals.push(cell.v.trim());
    }
    b.rows[r1][c1] = { v: vals.join(' '), ...(c2>c1?{cs:c2-c1+1}:{}), ...(r2>r1?{rs:r2-r1+1}:{}) };
    for (let r = r1; r <= r2; r++) for (let c = c1; c <= c2; c++) {
      if (r === r1 && c === c1) continue;
      b.rows[r][c] = null;
    }
    tableSelectState = null;
  }
  else if (action === 'table-unmerge') {
    if (!tableSelectState || tableSelectState.cells.size !== 1) { alert('분할할 셀 1개를 선택하세요.'); return; }
    const b = getBulletArray(btn.dataset)[+btn.dataset.bidx];
    const [r, c] = Array.from(tableSelectState.cells)[0].split(',').map(Number);
    const cell = b.rows[r][c];
    if (!cell) return;
    const cs = cell.cs || 1, rs = cell.rs || 1;
    b.rows[r][c] = { v: cell.v };
    for (let ri = r; ri < r + rs; ri++) for (let ci = c; ci < c + cs; ci++) {
      if (ri === r && ci === c) continue;
      b.rows[ri][ci] = { v: '' };
    }
    tableSelectState = null;
  }
  else if (action === 'table-add-row') {
    const b = getBulletArray(btn.dataset)[+btn.dataset.bidx];
    b.rows.push(b.rows[0].map(() => ({v:''})));
  }
  else if (action === 'table-del-row') {
    const b = getBulletArray(btn.dataset)[+btn.dataset.bidx];
    if (b.rows.length > 1) b.rows.pop();
  }
  else if (action === 'table-add-col') {
    const b = getBulletArray(btn.dataset)[+btn.dataset.bidx];
    b.rows.forEach(row => row.push({v:''}));
    if (!b.colWidths) b.colWidths = Array(b.rows[0].length - 1).fill(120);
    b.colWidths.push(120);
  }
  else if (action === 'table-del-col') {
    const b = getBulletArray(btn.dataset)[+btn.dataset.bidx];
    if (b.rows[0].length > 1) {
      b.rows.forEach(row => row.pop());
      if (b.colWidths && b.colWidths.length > 1) b.colWidths.pop();
    }
  }
  else if (action === 'add-coop') draft.items[+btn.dataset.item].coops.push({ dept: '', content: '', status: '진행예정' });
  else if (action === 'del-coop') draft.items[+btn.dataset.item].coops.splice(+btn.dataset.idx, 1);
  else if (action === 'add-decision') draft.items[+btn.dataset.item].decisions.push({ content: '' });
  else if (action === 'del-decision') draft.items[+btn.dataset.item].decisions.splice(+btn.dataset.idx, 1);
  else if (action === 'save-draft') { saveDraft(); return; }
  else return;

});

// ---------- 한글/엑셀 표 붙여넣기 ----------
document.getElementById('editArea').addEventListener('paste', (e) => {
  const t = e.target;
  if (!t.matches('input[data-trow]')) return;

  let pasteRows = null;

  // 1순위: HTML 파싱 (한글워드프로세서, Word 등 — 열 구조 보존)
  const html = (e.clipboardData || window.clipboardData).getData('text/html');
  if (html) {
    const div = document.createElement('div');
    div.innerHTML = html;
    const table = div.querySelector('table');
    if (table) {
      const rows = [];
      table.querySelectorAll('tr').forEach(tr => {
        const cells = Array.from(tr.querySelectorAll('td, th')).map(td =>
          (td.innerText || td.textContent || '').replace(/\s*\n\s*/g, ' ').trim()
        );
        if (cells.some(c => c)) rows.push(cells);
      });
      if (rows.length) pasteRows = rows;
    }
  }

  // 2순위: TSV 파싱 (엑셀, 구글시트 등)
  if (!pasteRows) {
    const text = (e.clipboardData || window.clipboardData).getData('text/plain');
    if (!text || (!text.includes('\t') && !text.includes('\n'))) return;
    pasteRows = text.trimEnd().split('\n').map(row =>
      row.split('\t').map(c => c.replace(/\r$/, '').trim())
    );
  }

  if (!pasteRows || !pasteRows.length) return;
  e.preventDefault();

  const b = getBulletArray(t.dataset)[+t.dataset.bidx];
  const startRow = +t.dataset.trow;
  const startCol = +t.dataset.tcol;
  const needCols = startCol + Math.max(...pasteRows.map(r => r.length));

  // 열 부족 시 확장
  while (b.rows[0].length < needCols) {
    b.rows.forEach(r => r.push({v:''}));
    if (b.colWidths) b.colWidths.push(120);
  }

  pasteRows.forEach((rowData, ri) => {
    const targetRow = startRow + ri;
    // 행 부족 시 확장
    while (b.rows.length <= targetRow) b.rows.push(b.rows[0].map(() => ({v:''})));
    rowData.forEach((cell, ci) => {
      const tc = startCol + ci;
      if (tc < b.rows[targetRow].length) {
        const existing = b.rows[targetRow][tc];
        if (existing === null) b.rows[targetRow][tc] = {v: cell};
        else if (existing) existing.v = cell;
      }
    });
  });

  renderEditForm();
});

function saveDraft() {
  if (!draft.name.trim()) { alert('보고자 이름을 입력해주세요.'); return; }
  const post = getCurrentPost();
  const existingIdx = post.reporters.findIndex(r => r.id === draft.id);
  const toSave = JSON.parse(JSON.stringify(draft));
  delete toSave._loadedFrom;
  if (existingIdx >= 0) post.reporters[existingIdx] = toSave;
  else post.reporters.push(toSave);
  saveData();
  draft._loadedFrom = draft.id;
  renderPostList();
  renderReporterSelect();
  renderReporters();
  alert('저장되었습니다.');
}

// ---------- 제출 현황 (읽기 전용) ----------
function renderReporters() {
  const post = getCurrentPost();
  const container = document.getElementById('reportersContainer');
  document.getElementById('reportersHeading').textContent = `📑 제출 현황 (${post.reporters.length}명)`;
  if (!post.reporters.length) {
    container.innerHTML = '<p class="empty">아직 제출된 보고가 없습니다.</p>';
    return;
  }
  container.innerHTML = post.reporters.map((r, idx) => {
    return `<div class="reporter-card" ${isAdmin ? `draggable="true" data-drag-idx="${idx}"` : ''}>
      <div class="reporter-card-head" data-toggle="${idx}">
        <div style="display:flex;align-items:center;">
          ${isAdmin ? `<span class="drag-handle" title="드래그하여 순서 변경">⠿</span>` : ''}
          <span class="name">${escapeHtml(r.name)}</span><span class="count">보고 항목 ${r.items.length}건</span>
        </div>
        <div class="reporter-card-actions">
          <button class="small-btn" data-edit="${r.id}">수정</button>
          ${isAdmin ? `<button class="small-btn danger" data-del="${r.id}">삭제</button>` : ''}
        </div>
      </div>
      <div class="reporter-card-body" id="reporter-body-${idx}">${renderReporterReadonly(r)}</div>
    </div>`;
  }).join('');

  container.querySelectorAll('[data-toggle]').forEach(head => {
    head.addEventListener('click', (e) => {
      if (e.target.closest('button')) return;
      const idx = head.dataset.toggle;
      document.getElementById(`reporter-body-${idx}`).classList.toggle('open');
    });
  });

  if (isAdmin) {
    container.querySelectorAll('.reporter-card[draggable]').forEach(card => {
      card.addEventListener('dragstart', e => {
        isDragging = true;
        e.dataTransfer.setData('text/plain', card.dataset.dragIdx);
        e.dataTransfer.effectAllowed = 'move';
        card.classList.add('dragging');
      });
      card.addEventListener('dragend', () => {
        isDragging = false;
        container.querySelectorAll('.reporter-card').forEach(c => {
          c.classList.remove('dragging');
          c.classList.remove('drag-over');
        });
        if (rerenderPending) {
          rerenderPending = false;
          renderReporters();
        }
      });
      card.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        container.querySelectorAll('.reporter-card').forEach(c => c.classList.remove('drag-over'));
        card.classList.add('drag-over');
      });
      card.addEventListener('drop', e => {
        e.preventDefault();
        const srcIdx = +e.dataTransfer.getData('text/plain');
        const destIdx = +card.dataset.dragIdx;
        if (isNaN(srcIdx) || srcIdx === destIdx) return;
        const post = getCurrentPost();
        const moved = post.reporters.splice(srcIdx, 1)[0];
        post.reporters.splice(destIdx, 0, moved);
        saveData();
      });
    });
  }
  container.querySelectorAll('[data-edit]').forEach(b => {
    b.addEventListener('click', () => {
      document.getElementById('loadReporterSelect').value = b.dataset.edit;
      onLoadReporterChange();
      window.scrollTo({ top: document.getElementById('editArea').getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' });
    });
  });
  container.querySelectorAll('[data-del]').forEach(b => {
    b.addEventListener('click', () => {
      if (!confirm('이 보고자의 제출 내용을 삭제하시겠습니까?')) return;
      const post = getCurrentPost();
      post.reporters = post.reporters.filter(r => r.id !== b.dataset.del);
      saveData();
      if (draft && draft._loadedFrom === b.dataset.del) startNewReport();
      renderReporterSelect();
      renderReporters();
      renderPostList();
    });
  });
}

function openPrevLoadModal() {
  const postSel = document.getElementById('prevPostSelect');
  const repSel  = document.getElementById('prevReporterSelect');
  const others = data.posts.filter(p => p.id !== currentPostId);
  postSel.innerHTML = '<option value="">-- 주차를 선택하세요 --</option>' +
    others.map(p => `<option value="${p.id}">${escapeHtml(p.title || p.id)}</option>`).join('');
  repSel.innerHTML = '<option value="">-- 주차를 먼저 선택하세요 --</option>';
  // 이름이 이미 있으면 같은 이름 자동 매칭 시도
  postSel.onchange = onPrevPostChange;
  document.getElementById('prevLoadModal').classList.add('open');
}
function closePrevModal() {
  document.getElementById('prevLoadModal').classList.remove('open');
}
function onPrevPostChange() {
  const postId = document.getElementById('prevPostSelect').value;
  const repSel = document.getElementById('prevReporterSelect');
  if (!postId) { repSel.innerHTML = '<option value="">-- 주차를 먼저 선택하세요 --</option>'; return; }
  const post = data.posts.find(p => p.id === postId);
  if (!post) return;
  repSel.innerHTML = '<option value="">-- 담당자 선택 --</option>' +
    post.reporters.map(r => `<option value="${r.id}">${escapeHtml(r.name || '(이름없음)')}</option>`).join('');
  // 현재 이름과 일치하는 담당자 자동 선택
  if (draft.name) {
    const match = post.reporters.find(r => r.name === draft.name);
    if (match) repSel.value = match.id;
  }
}
function loadPrevReporter() {
  const postId = document.getElementById('prevPostSelect').value;
  const repId  = document.getElementById('prevReporterSelect').value;
  if (!postId || !repId) { alert('주차와 담당자를 모두 선택해주세요.'); return; }
  const post = data.posts.find(p => p.id === postId);
  const rep  = post && post.reporters.find(r => r.id === repId);
  if (!rep) { alert('데이터를 찾을 수 없습니다.'); return; }
  const currentName = draft.name; // 현재 이름 유지
  draft = JSON.parse(JSON.stringify(rep)); // 깊은 복사
  draft.id = uid(); // 새 id 부여
  draft.name = currentName || rep.name;
  draft._loadedFrom = null;
  draftHistory = [];
  closePrevModal();
  renderEditForm();
  alert(`"${rep.name}"의 이전 보고를 불러왔습니다. 내용을 수정 후 저장하세요.`);
}

// ---------- 피드백 ----------
let _feedbackRating = 0;

function openFeedbackModal() {
  _feedbackRating = 0;
  document.getElementById('feedbackText').value = '';
  const row = document.getElementById('starRow');
  row.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const btn = document.createElement('button');
    btn.className = 'star-btn';
    btn.textContent = '★';
    btn.dataset.v = i;
    btn.onclick = () => { _feedbackRating = i; updateStars(); };
    btn.onmouseenter = () => highlightStars(i);
    btn.onmouseleave = () => updateStars();
    row.appendChild(btn);
  }
  document.getElementById('feedbackModal').classList.add('open');
}
function closeFeedbackModal() {
  document.getElementById('feedbackModal').classList.remove('open');
}
function updateStars() {
  document.querySelectorAll('.star-btn').forEach(b => b.classList.toggle('active', +b.dataset.v <= _feedbackRating));
}
function highlightStars(n) {
  document.querySelectorAll('.star-btn').forEach(b => b.classList.toggle('active', +b.dataset.v <= n));
}
async function submitFeedback() {
  const content = document.getElementById('feedbackText').value.trim();
  if (!_feedbackRating && !content) { alert('별점 또는 의견을 입력해주세요.'); return; }
  const btn = document.getElementById('feedbackSubmitBtn');
  btn.disabled = true; btn.textContent = '제출 중...';
  try {
    await db.collection('feedback').add({ rating: _feedbackRating, content, createdAt: new Date().toISOString() });
    closeFeedbackModal();
    alert('피드백을 제출했습니다. 감사합니다! 😊');
  } catch(e) {
    alert('오류: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '제출';
  }
}
async function loadFeedback() {
  const container = document.getElementById('feedbackList');
  if (!container) return;
  container.innerHTML = '<p class="feedback-empty">불러오는 중...</p>';
  try {
    const snap = await db.collection('feedback').orderBy('createdAt', 'desc').get();
    if (snap.empty) { container.innerHTML = '<p class="feedback-empty">아직 피드백이 없습니다.</p>'; return; }
    container.innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      const stars = d.rating ? '★'.repeat(d.rating) + '☆'.repeat(5 - d.rating) : '';
      const date = new Date(d.createdAt).toLocaleString('ko-KR');
      return `<div class="feedback-item">
        <div class="feedback-meta">${stars ? `<span class="feedback-stars">${stars}</span>` : ''}<span class="feedback-date">${date}</span></div>
        ${d.content ? `<p class="feedback-content">${escapeHtml(d.content)}</p>` : ''}
      </div>`;
    }).join('');
  } catch(e) {
    container.innerHTML = `<p class="feedback-empty">오류: ${e.message}</p>`;
  }
}

applyAdminUI();
document.getElementById('postList').innerHTML = '<li class="empty">불러오는 중...</li>';
</script>

<!-- 피드백 모달 -->
<div class="feedback-modal" id="feedbackModal" onclick="if(event.target===this)closeFeedbackModal()">
  <div class="feedback-modal-box">
    <h3>💬 피드백 보내기</h3>
    <div class="star-row" id="starRow"></div>
    <textarea id="feedbackText" placeholder="의견을 자유롭게 입력해주세요 (선택)"></textarea>
    <div class="feedback-modal-actions">
      <button id="feedbackCancelBtn" onclick="closeFeedbackModal()">취소</button>
      <button id="feedbackSubmitBtn" onclick="submitFeedback()">제출</button>
    </div>
  </div>
</div>
</body>
